<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图库 Demo · Figma 还原</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0B0B0F;
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.15);
      --primary: linear-gradient(135deg, #FF7A00 0%, #FF4D00 100%);
      --radius: 4px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: #fff;
      font-family: "Microsoft YaHei UI", "Inter", sans-serif;
      padding: 60px 40px;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff;
    }

    .section-header::before {
      content: "";
      width: 4px;
      height: 24px;
      background: #FF7A00;
      border-radius: 2px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(297px, 1fr));
      gap: 20px;
    }

    .card {
      width: 297.5px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      backdrop-filter: blur(50px);
      transition: transform 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .card:hover { transform: translateY(-5px); }

    .card__img-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      background: #111;
    }

    .card__img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card__score {
      position: absolute;
      top: 8px; right: 8px;
      padding: 2px 8px;
      background: rgba(0,0,0,0.5);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
    }

    .card__color-bg {
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 60%;
      pointer-events: none; z-index: 0;
      transition: background 0.6s ease;
    }

    .card__info {
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 1;
    }

    .card__title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .card__date {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }

    .card__tags {
      display: flex;
      gap: 8px;
    }

    .card__tag {
      padding: 2px 8px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
    }

    .card__desc {
      font-size: 14px;
      line-height: 1.5;
      color: rgba(255,255,255,0.8);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card__btn {
      height: 48px;
      background: var(--primary);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="section-header">为您推荐</header>
    <main class="cards-grid" id="grid"></main>
  </div>
  <canvas id="extraction-canvas" style="display:none"></canvas>
  <script>
    const DATA = [
      { title: "Resident Evil", date: "2026年3月10日", desc: "予生者恐惧，给亡者安魂", tags: ["动作", "Rogue"], score: "9.2", seed: "horror" },
      { title: "Galactic Vault", date: "2026年3月12日", desc: "打造你的极致射击体验", tags: ["FPS", "Rogue"], score: "9.8", seed: "space" },
      { title: "High Risk", date: "2026年3月11日", desc: "押上你的全部资金", tags: ["投资", "Rogue"], score: "9.1", seed: "money" }
    ];

    function render() {
      const grid = document.getElementById("grid");
      DATA.forEach(item => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="card__img-wrap">
            <img crossorigin="anonymous" src="https://picsum.photos/seed/${item.seed}/800/500">
            <div class="card__score">★ ${item.score}</div>
          </div>
          <div class="card__color-bg"></div>
          <div class="card__info">
            <div class="card__title">${item.title}</div>
            <div class="card__date">发行日期: ${item.date}</div>
            <div class="card__tags">${item.tags.map(t=>`<span class="card__tag">${t}</span>`).join("")}</div>
            <div class="card__desc">${item.desc}</div>
            <button class="card__btn">预约</button>
          </div>
        `;
        grid.appendChild(card);
        const img = card.querySelector("img");
        img.onload = () => {
          const c = extract(img);
          card.querySelector(".card__color-bg").style.background = `radial-gradient(ellipse at 50% 100%, rgba(${c.join(",")},0.6) 0%, transparent 100%)`;
          card.style.borderColor = `rgba(${c.join(",")},0.3)`;
        };
      });
    }

    function extract(img) {
      const cv = document.getElementById("extraction-canvas");
      const cx = cv.getContext("2d");
      cv.width = 50; cv.height = 30;
      cx.drawImage(img, 0, 0, 50, 30);
      const d = cx.getImageData(0, 0, 50, 30).data;
      let r=0, g=0, b=0;
      for(let i=0; i<d.length; i+=4) { r+=d[i]; g+=d[i+1]; b+=d[i+2]; }
      const n = d.length/4;
      return [Math.round(r/n), Math.round(g/n), Math.round(b/n)];
    }

    render();
  <\/script>
</body>
</html>
